name: Refresh Google reviews

on:
  schedule:
    # Daily at 11:00 UTC (~7am ET). Adjust as desired.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          PLACE_IDS: ${{ secrets.PLACE_IDS }}
        run: node scripts/fetch-reviews.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- cleanerflow/src/data/reviews.json; then
            echo "No new reviews."
            exit 0
          fi
          git config user.name  "spotless-reviews-bot"
          git config user.email "spotless-reviews-bot@users.noreply.github.com"
          git add cleanerflow/src/data/reviews.json
          git commit -m "chore(reviews): refresh from Google Places API"
          git push
